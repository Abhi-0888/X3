services:
  - type: web
    name: aeci-api-server
    env: node
    buildCommand: cd artifacts/api-server && npm install && npm run build
    startCommand: cd artifacts/api-server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_PATH
        value: /
      # Add your MongoDB Atlas URI in Render dashboard
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /api/healthz
    autoDeploy: true
    plan: free
